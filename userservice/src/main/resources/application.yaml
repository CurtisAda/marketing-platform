spring:
  application:
    name: userservice

  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: user_admin
    password: user_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true


server:
  port: 8081